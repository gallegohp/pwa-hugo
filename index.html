<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OMDb Movie Explorer - Mankind - Explora películas de la base de datos OMDb">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Mankind · Movie Explorer</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <!-- Tipografía Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Encabezado de la Aplicación -->
    <header id="app-header">
        <div class="header-inner">
            <div class="header-brand">
                <div>
                    <h1>Mankind</h1>
                    <p class="brand-sub">OMDb Movie Database</p>
                </div>
            </div>
            
            <!-- Botón de Modo Oscuro/Claro -->
            <button id="theme-toggle" class="theme-toggle" aria-label="Cambiar tema">
                <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>

        <!-- Controles de Filtros -->
        <div class="filters-bar">
            
            <button class="filter-pill active" id="btn-todas" onclick="limpiarFiltrosYBuscar(); resetAllVisualFilters()">
                Todas
            </button>

            <div class="filter-dropdown" id="drop-tipo">
                <button class="filter-pill has-arrow" onclick="toggleDropdown('drop-tipo')">
                    Tipo <span class="arrow">▾</span>
                </button>
                <div class="dropdown-menu">
                    <button onclick="setFiltroTipo('movie'); closeAllDropdowns(); setActiveInGroup(document.querySelector('#drop-tipo .filter-pill'))">Películas</button>
                    <button onclick="setFiltroTipo('series'); closeAllDropdowns(); setActiveInGroup(document.querySelector('#drop-tipo .filter-pill'))">Series</button>
                </div>
            </div>

            <div class="filter-dropdown" id="drop-decadas">
                <button class="filter-pill has-arrow" onclick="toggleDropdown('drop-decadas')">
                    Década <span class="arrow">▾</span>
                </button>
                <div class="dropdown-menu">
                    <button onclick="setFiltroDecada(1950); closeAllDropdowns(); setActiveInGroup(document.querySelector('#drop-decadas .filter-pill'))">1950s</button>
                    <button onclick="setFiltroDecada(1960); closeAllDropdowns(); setActiveInGroup(document.querySelector('#drop-decadas .filter-pill'))">1960s</button>
                    <button onclick="setFiltroDecada(1970); closeAllDropdowns(); setActiveInGroup(document.querySelector('#drop-decadas .filter-pill'))">1970s</button>
                    <button onclick="setFiltroDecada(1980); closeAllDropdowns(); setActiveInGroup(document.querySelector('#drop-decadas .filter-pill'))">1980s</button>
                    <button onclick="setFiltroDecada(1990); closeAllDropdowns(); setActiveInGroup(document.querySelector('#drop-decadas .filter-pill'))">1990s</button>
                    <button onclick="setFiltroDecada(2000); closeAllDropdowns(); setActiveInGroup(document.querySelector('#drop-decadas .filter-pill'))">2000s</button>
                    <button onclick="setFiltroDecada(2010); closeAllDropdowns(); setActiveInGroup(document.querySelector('#drop-decadas .filter-pill'))">2010s</button>
                    <button onclick="setFiltroDecada(2020); closeAllDropdowns(); setActiveInGroup(document.querySelector('#drop-decadas .filter-pill'))">2020s</button>
                </div>
            </div>

            <div class="filter-dropdown" id="drop-rating">
                <button class="filter-pill has-arrow" onclick="toggleDropdown('drop-rating')">
                    Rating <span class="arrow">▾</span>
                </button>
                <div class="dropdown-menu">
                    <button onclick="setFiltroClasificacion(8, 10); closeAllDropdowns(); setActiveInGroup(document.querySelector('#drop-rating .filter-pill'))">8.0 – 10.0</button>
                    <button onclick="setFiltroClasificacion(6, 7.9); closeAllDropdowns(); setActiveInGroup(document.querySelector('#drop-rating .filter-pill'))">6.0 – 7.9</button>
                    <button onclick="setFiltroClasificacion(4, 5.9); closeAllDropdowns(); setActiveInGroup(document.querySelector('#drop-rating .filter-pill'))">4.0 – 5.9</button>
                    <button onclick="setFiltroClasificacion(0, 3.9); closeAllDropdowns(); setActiveInGroup(document.querySelector('#drop-rating .filter-pill'))">Menos de 4.0</button>
                </div>
            </div>

            <div class="filter-dropdown" id="drop-genero">
                <button class="filter-pill has-arrow" onclick="toggleDropdown('drop-genero')">
                    Género <span class="arrow">▾</span>
                </button>
                <div class="dropdown-menu">
                    <button onclick="setFiltroGenero('Action'); closeAllDropdowns(); setActiveInGroup(document.querySelector('#drop-genero .filter-pill'))">Acción</button>
                    <button onclick="setFiltroGenero('Drama'); closeAllDropdowns(); setActiveInGroup(document.querySelector('#drop-genero .filter-pill'))">Drama</button>
                    <button onclick="setFiltroGenero('Thriller'); closeAllDropdowns(); setActiveInGroup(document.querySelector('#drop-genero .filter-pill'))">Thriller</button>
                    <button onclick="setFiltroGenero('Comedy'); closeAllDropdowns(); setActiveInGroup(document.querySelector('#drop-genero .filter-pill'))">Comedia</button>
                    <button onclick="setFiltroGenero('Documentary'); closeAllDropdowns(); setActiveInGroup(document.querySelector('#drop-genero .filter-pill'))">Documental</button>
                    <button onclick="setFiltroGenero('Adventure'); closeAllDropdowns(); setActiveInGroup(document.querySelector('#drop-genero .filter-pill'))">Aventura</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Vista de Búsqueda -->
    <main id="pagina-busqueda" class="pagina activa">
        <div id="resultados" class="contenedor-resultados">
            <div class="carga">
                <div class="spinner"></div>
                <p>Cargando películas...</p>
            </div>
        </div>
    </main>

    <!-- Vista de Detalle -->
    <main id="pagina-detalle" class="pagina">
        <div class="detalle-container">
            <button class="btn-back" onclick="volverABusqueda()">← Volver</button>
            <div id="detalle-contenido" class="detalle-contenido">
            </div>
        </div>
    </main>

    <!-- Pie de Página -->
    <footer>
        <p>Mankind · OMDb Movie Explorer</p>
    </footer>

    <script src="js/app.js"></script>
    <script>
        /**
         * Alterna la visibilidad de un menú desplegable específico.
         * @param {string} id - El identificador del contenedor del menú desplegable.
         */
        function toggleDropdown(id) {
            const dropdown = document.getElementById(id);
            const isOpen = dropdown.classList.contains('open');
            closeAllDropdowns();
            if (!isOpen) {
                dropdown.classList.add('open');
            }
        }

        /**
         * Cierra todos los menús desplegables que se encuentren abiertos.
         */
        function closeAllDropdowns() {
            document.querySelectorAll('.filter-dropdown').forEach(d => d.classList.remove('open'));
        }

        /**
         * Evento para cerrar los menús desplegables al hacer clic fuera de ellos.
         */
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.filter-dropdown') && !e.target.closest('.filter-pill')) {
                closeAllDropdowns();
            }
        });

        /**
         * Evento para cerrar los menús desplegables al presionar la tecla Escape.
         */
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeAllDropdowns();
        });

        /**
         * Marca un botón desplegable como activo sin apagar los demás.
         * Apaga el botón de "Todas" ya que ahora hay filtros específicos.
         * @param {HTMLElement} btn - El botón del filtro a activar.
         */
        function setActiveInGroup(btn) {
            document.getElementById('btn-todas').classList.remove('active');
            if (btn) btn.classList.add('active');
        }

        /**
         * Reinicia los botones de filtros al estado inicial (solo "Todas" activo).
         */
        function resetAllVisualFilters() {
            document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
            document.getElementById('btn-todas').classList.add('active');
        }

        /**
         * Registro del Service Worker para habilitar las capacidades PWA (Aplicación Web Progresiva).
         */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('Service Worker registrado correctamente:', registration.scope);
                    })
                    .catch(error => {
                        console.error('Fallo en el registro del Service Worker:', error);
                    });
            });
        }
    </script>
</body>
</html>
