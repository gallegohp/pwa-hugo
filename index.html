<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OMDb Movie Explorer - Mankind - Explora películas de la base de datos OMDb">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Mankind · Movie Explorer</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Application Header -->
    <header id="app-header">
        <div class="header-inner">
            <div class="header-brand">
                <span class="brand-icon">🎬</span>
                <div>
                    <h1>Mankind</h1>
                    <p class="brand-sub">OMDb Movie Database</p>
                </div>
            </div>
        </div>

        <!-- Filter Controls -->
        <div class="filters-bar">
            
            <button class="filter-pill active" id="btn-todas" onclick="buscarTodas(); setActiveGlobal(this)">
                Todas
            </button>

            <div class="filter-dropdown" id="drop-tipo">
                <button class="filter-pill has-arrow" onclick="toggleDropdown('drop-tipo')">
                    Tipo <span class="arrow">▾</span>
                </button>
                <div class="dropdown-menu">
                    <button onclick="buscarPorTipo('movie'); closeAllDropdowns(); setActiveGlobal(document.querySelector('#drop-tipo .filter-pill'))">🎬 Películas</button>
                    <button onclick="buscarPorTipo('series'); closeAllDropdowns(); setActiveGlobal(document.querySelector('#drop-tipo .filter-pill'))">📺 Series</button>
                </div>
            </div>

            <div class="filter-dropdown" id="drop-decadas">
                <button class="filter-pill has-arrow" onclick="toggleDropdown('drop-decadas')">
                    Década <span class="arrow">▾</span>
                </button>
                <div class="dropdown-menu">
                    <button onclick="buscarPorDecada(1950); closeAllDropdowns(); setActiveGlobal(document.querySelector('#drop-decadas .filter-pill'))">1950s</button>
                    <button onclick="buscarPorDecada(1960); closeAllDropdowns(); setActiveGlobal(document.querySelector('#drop-decadas .filter-pill'))">1960s</button>
                    <button onclick="buscarPorDecada(1970); closeAllDropdowns(); setActiveGlobal(document.querySelector('#drop-decadas .filter-pill'))">1970s</button>
                    <button onclick="buscarPorDecada(1980); closeAllDropdowns(); setActiveGlobal(document.querySelector('#drop-decadas .filter-pill'))">1980s</button>
                    <button onclick="buscarPorDecada(1990); closeAllDropdowns(); setActiveGlobal(document.querySelector('#drop-decadas .filter-pill'))">1990s</button>
                    <button onclick="buscarPorDecada(2000); closeAllDropdowns(); setActiveGlobal(document.querySelector('#drop-decadas .filter-pill'))">2000s</button>
                    <button onclick="buscarPorDecada(2010); closeAllDropdowns(); setActiveGlobal(document.querySelector('#drop-decadas .filter-pill'))">2010s</button>
                    <button onclick="buscarPorDecada(2020); closeAllDropdowns(); setActiveGlobal(document.querySelector('#drop-decadas .filter-pill'))">2020s</button>
                </div>
            </div>

            <div class="filter-dropdown" id="drop-rating">
                <button class="filter-pill has-arrow" onclick="toggleDropdown('drop-rating')">
                    Rating <span class="arrow">▾</span>
                </button>
                <div class="dropdown-menu">
                    <button onclick="buscarPorClasificacion(8, 10); closeAllDropdowns(); setActiveGlobal(document.querySelector('#drop-rating .filter-pill'))">⭐ 8 – 10</button>
                    <button onclick="buscarPorClasificacion(6, 7.9); closeAllDropdowns(); setActiveGlobal(document.querySelector('#drop-rating .filter-pill'))">⭐ 6 – 7.9</button>
                    <button onclick="buscarPorClasificacion(4, 5.9); closeAllDropdowns(); setActiveGlobal(document.querySelector('#drop-rating .filter-pill'))">⭐ 4 – 5.9</button>
                    <button onclick="buscarPorClasificacion(0, 3.9); closeAllDropdowns(); setActiveGlobal(document.querySelector('#drop-rating .filter-pill'))">⭐ Menos de 4</button>
                </div>
            </div>

            <div class="filter-dropdown" id="drop-genero">
                <button class="filter-pill has-arrow" onclick="toggleDropdown('drop-genero')">
                    Género <span class="arrow">▾</span>
                </button>
                <div class="dropdown-menu">
                    <button onclick="buscarPorGenero('Action'); closeAllDropdowns(); setActiveGlobal(document.querySelector('#drop-genero .filter-pill'))">Acción</button>
                    <button onclick="buscarPorGenero('Drama'); closeAllDropdowns(); setActiveGlobal(document.querySelector('#drop-genero .filter-pill'))">Drama</button>
                    <button onclick="buscarPorGenero('Thriller'); closeAllDropdowns(); setActiveGlobal(document.querySelector('#drop-genero .filter-pill'))">Thriller</button>
                    <button onclick="buscarPorGenero('Comedy'); closeAllDropdowns(); setActiveGlobal(document.querySelector('#drop-genero .filter-pill'))">Comedia</button>
                    <button onclick="buscarPorGenero('Documentary'); closeAllDropdowns(); setActiveGlobal(document.querySelector('#drop-genero .filter-pill'))">Documental</button>
                    <button onclick="buscarPorGenero('Adventure'); closeAllDropdowns(); setActiveGlobal(document.querySelector('#drop-genero .filter-pill'))">Aventura</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Search View -->
    <main id="pagina-busqueda" class="pagina activa">
        <div id="resultados" class="contenedor-resultados">
            <div class="carga">
                <div class="spinner"></div>
                <p>Cargando películas...</p>
            </div>
        </div>
    </main>

    <!-- Detail View -->
    <main id="pagina-detalle" class="pagina">
        <div class="detalle-container">
            <button class="btn-back" onclick="volverABusqueda()">← Volver</button>
            <div id="detalle-contenido" class="detalle-contenido">
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>Mankind · OMDb Movie Explorer</p>
    </footer>

    <script src="js/app.js"></script>
    <script>
        /**
         * Toggles the visibility of a dropdown menu.
         * @param {string} id - The ID of the dropdown container.
         */
        function toggleDropdown(id) {
            const dropdown = document.getElementById(id);
            const isOpen = dropdown.classList.contains('open');
            closeAllDropdowns();
            if (!isOpen) {
                dropdown.classList.add('open');
            }
        }

        /**
         * Closes all open dropdown menus.
         */
        function closeAllDropdowns() {
            document.querySelectorAll('.filter-dropdown').forEach(d => d.classList.remove('open'));
        }

        /**
         * Event listener to close dropdowns when clicking outside.
         */
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.filter-dropdown') && !e.target.closest('.filter-pill')) {
                closeAllDropdowns();
            }
        });

        /**
         * Event listener to close dropdowns on Escape key press.
         */
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeAllDropdowns();
        });

        /**
         * Sets the active visual state for the selected filter pill.
         * @param {HTMLElement} btn - The button element to set as active.
         */
        function setActiveGlobal(btn) {
            document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
            if (btn) btn.classList.add('active');
        }

        /**
         * Service Worker registration for PWA capabilities.
         */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('SW registered:', registration.scope);
                    })
                    .catch(error => {
                        console.log('SW registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
